[SCP-015]
image path = scp015.png
disablebackground = true
align x = center
align y = center
text1 = SCP-015 is a mass of pipes, vents, boilers and other various plumbing apparatus completely filling a warehouse in [REDACTED]. The pipes appear to grow when not under observation, attempting to connect to nearby structures via sewer systems and underground plumbing.
text2 = SCP-015 contains, at current estimate, over 190 kilometers (120 miles) of pipes, ranging in diameter from 2.5 cm to over 1 m. Some pipes appear new, while others are rusted and leaking.
text3 = Pipes have been reported as being made of bone, wood, steel, pressed ash, human flesh, glass, and granite. No pipes composed of lead, PVC plastic, copper, or any other traditional material for the production of pipes have been found.

[SCP-018]
image path = scp018.png
align x = left
align y = bottom
text1 = SCP-018 has the appearance of a Super Ball made by the Wham-O company in 1969. It is six (6) centimeters in diameter and coloured red.
text2 = Found when the [REDACTED] company was hired to clean out a warehouse that had Wham-O merchandise in it, SCP-018 was noted to be able to bounce with extreme height. At first thought to be a pleasant child's toy, SCP-018 was able to bounce with over two hundred percent (200%) efficiency (that is, if dropped one (1) meter, it would bounce two (2), then four (4), then eight (8), then sixteen (16)).
text3 = The ball soon became a dangerous projectile, reaching speeds estimated at over 100 km/h and damaging property and injuring five (5) in the city of [REDACTED].
text4 = It came to a rest after several days in the nearby lake of [REDACTED], and was retrieved by SCP personnel. Due to the speed of the object, and the total surprise by its victims, no cover-up story was required or initiated.